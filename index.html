      transition: background 1s ease;
    }

    body.christmas { background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); }

    body.easter { background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%); }
    body.pentecost { background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%); }
    body.ordinary { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }

    .app-container {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      color: white;
    }

    /* Header - Modified for Centered Clock */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 32px;
      background: rgba(0, 0, 0, 0.2);
      backdrop-filter: blur(10px);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 20px;
      flex: 1; /* Takes available space */
    }

    .logo {
      font-size: 32px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    /* Center Section for Clock */
    .header-center {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .datetime {
      display: flex;
      flex-direction: column;
      align-items: center; /* Center text horizontally */
      font-size: 14px;
      opacity: 0.9;
    }

    .date {
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .time {
      font-size: 48px; /* Enlarged Clock */
      font-weight: 700;
      font-family: 'Courier New', monospace;
      line-height: 1;
      margin-top: 5px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.3);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
      flex: 1;
      justify-content: flex-end; /* Aligns buttons to the right */
    }

    .network-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
    }

    .network-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #10b981;
      box-shadow: 0 0 10px currentColor;
      animation: pulse 2s infinite;
    }

    .network-dot.offline {
      background: #ef4444;
    }

    .settings-btn, .feedback-btn {
      background: rgba(255, 255, 255, 0.15);
      border: none;
      color: white;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 20px;
      transition: all 0.2s;
    }

    .settings-btn:hover {
      background: rgba(255, 255, 255, 0.25);
      transform: rotate(90deg);
    }
    
    .feedback-btn:hover {
      background: rgba(255, 255, 255, 0.25);
      transform: scale(1.1);
    }

    /* Main Content */
    .content {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 32px;
    }

    .verse-container {
      max-width: 900px;
      width: 100%;
      text-align: center;
      animation: fadeIn 1s ease;
    }

    .verse-text {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 48px;
      line-height: 1.6;
      margin-bottom: 32px;
      text-shadow: 0 2px 20px rgba(0, 0, 0, 0.3);
      font-style: italic;
      animation: fadeIn 1s ease;
    }

    .verse-reference {
      font-size: 24px;
      font-weight: 700;
      opacity: 0.9;
      margin-bottom: 12px;
    }

    .verse-meta {
      font-size: 16px;
      opacity: 0.7;
      margin-top: 8px;
    }

    .verse-commentary {
      max-width: 700px;
      margin: 24px auto 0;
      padding: 20px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      font-size: 18px;
      line-height: 1.6;
      font-style: italic;
    }

    /* Channel Info */
    .channel-info {
      position: fixed;
      bottom: 24px;
      left: 32px;
      background: rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(10px);
      padding: 16px 24px;
      border-radius: 12px;
      font-size: 14px;
      max-width: 300px;
    }

    .channel-name {
      font-weight: 700;
      margin-bottom: 4px;
    }

    .channel-id {
      font-size: 12px;
      opacity: 0.7;
      font-family: monospace;
    }

    /* Loading State */
    .loading {
      text-align: center;
      padding: 60px;
    }

    .loading-spinner {
      width: 60px;
      height: 60px;
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    /* Animations */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.5;
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* Settings Modal */
    .settings-modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(4px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    .settings-modal.active {
      display: flex;
    }

    .settings-content {
      background: white;
      color: #1f2937;
      border-radius: 20px;
      padding: 32px;
      max-width: 500px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
    }

    .settings-title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 24px;
      color: #1f2937;
    }

    .settings-group {
      margin-bottom: 24px;
    }

    .settings-label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
      color: #4b5563;
    }

    select, input {
      width: 100%;
      padding: 12px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      font-size: 15px;
      background: white;
    }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-secondary {
      background: #f3f4f6;
      color: #4b5563;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

      .header {

      .header-center {
        order: 3; /* Move clock to bottom on mobile */

        flex: none;

      .logo {

      .verse-text {

      }

      .verse-reference {

      }

      .content {

      }

      .channel-info {
        bottom: 16px;
        left: 20px;
        right: 20px;
        max-width: none;
      }
    }

    /* Fullscreen mode */
    .fullscreen .header {
      display: none;
    }

    .fullscreen .channel-info {
      display: none;
    }
  </style>

    ];

    // Global State
    let userConfig = {
      bibleVersion: 'LSG',
      language: 'fr-FR'
    };

    let currentPlanIndex = 0;
    let lastUpdateTime = 0;

    /**
     * Initialize Application
     */
    async function init() {
      console.log('🚀 Initializing SangoCast v3.0...');
      
      // Initialize Prayer Alarms
      SangocastPrayerAlarms.init();
      
      // Initialize Bible System
      initializeBibleSystem();
      
      // Load Settings
      loadSettings();
      
      // Start Clock
      setInterval(updateClock, 1000);
      updateClock();
      
      // Start Content Rotation (10 minutes)
      setInterval(checkContentUpdate, 60000); // Check every minute
      
      // Initial Load
      await updateContent();
      
      console.log('✅ SangoCast Ready');
    }

    /**
     * Initialize Bible Lookup System
     * Pattern from File 2
     */
    function initializeBibleSystem() {
      if (typeof SangocastBibleLookup === 'undefined') {
        console.error('❌ Bible Lookup Module not loaded!');
        return false;
      }

      // Register Bibles with correct paths
      SangocastBibleLookup.registerBible('LSG', 'data/bibles/french_louis_segond.json');
      SangocastBibleLookup.registerBible('KJV', 'data/bibles/kjv.json');
      
      console.log('📚 Bibles Registered:', SangocastBibleLookup.getAvailableBibles());
      return true;
    }

    /**
     * Load User Settings
     */
    function loadSettings() {
      userConfig.bibleVersion = localStorage.getItem('sangocast_bible_version') || 'LSG';
      userConfig.language = localStorage.getItem('sangocast_language') || 'fr-FR';
      
      // Update UI
      document.getElementById('setting-bible').value = userConfig.bibleVersion;
      document.getElementById('setting-language').value = userConfig.language;
      
      // Update Prayer Alarm Language
      SangocastPrayerAlarms.setLanguage(userConfig.language);
    }

    /**
     * Update Clock Display
     */
    function updateClock() {
      const now = new Date();
      
      const dateOptions = { 
        weekday: 'long', 
        year: 'numeric', 
        month: 'long', 
        day: 'numeric' 
      };
      document.getElementById('current-date').textContent = now.toLocaleDateString(userConfig.language, dateOptions);
      
      const timeStr = now.toLocaleTimeString(userConfig.language, {
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: false
      });
      document.getElementById('current-time').textContent = timeStr;
    }

    /**
     * Check if we need to update content (every 10 min)
     */
    function checkContentUpdate() {
      const now = new Date();
      const currentMinutes = now.getMinutes();
      
      // Check if we're at a 10-minute mark (0, 10, 20, 30, 40, 50)
      if (currentMinutes % 10 === 0) {
        const currentTime = now.getTime();
        // Prevent multiple updates in the same minute
        if (currentTime - lastUpdateTime > 60000) {
          updateContent();
          lastUpdateTime = currentTime;
        }
      }
    }

    /**
     * Update Main Content from Plan
     */
    async function updateContent() {
      try {
        showLoading();
        
        // Get current plan item
        const planItem = TESTING_PLAN[currentPlanIndex];
        
        // Lookup verse using robust File 2 method
        const result = await SangocastBibleLookup.lookupVerse({
          version: userConfig.bibleVersion,
          book: planItem.book,
          chapter: planItem.chapter,
          verses: planItem.verses
        });

        if (result.error) {
          throw new Error(result.error);
        }

        // Display
        displayContent(result, planItem.commentary);
        
        // Increment for next time
        currentPlanIndex = (currentPlanIndex + 1) % TESTING_PLAN.length;
        
        console.log('✅ Content Updated:', result.reference);
        
      } catch (error) {
        console.error('❌ Content Update Error:', error);
        displayError();
      }
    }

    /**
     * Display Content in UI
     */
    function displayContent(result, commentary) {
      const container = document.getElementById('verse-container');
      
      let html = `
        <div class="verse-text">"${result.text}"</div>
        <div class="verse-reference">— ${result.reference}</div>
        <div class="verse-meta">${result.version}</div>
      `;
      
      if (commentary) {
        html += `<div class="verse-commentary">💭 ${commentary}</div>`;
      }
      
      container.innerHTML = html;
      
      // Trigger animation
      container.style.animation = 'none';
      setTimeout(() => {
        container.style.animation = 'fadeIn 1s ease';
      }, 10);
    }

    /**
     * Show Loading State
     */
    function showLoading() {
      document.getElementById('verse-container').innerHTML = `
        <div class="loading">
          <div class="loading-spinner"></div>
          <div>Loading Scripture...</div>
        </div>
      `;
    }

    /**
     * Display Error
     */
    function displayError() {
      document.getElementById('verse-container').innerHTML = `
        <div class="verse-text">⚠️ Unable to Load</div>
        <div class="verse-reference">Please check your connection</div>
      `;
    }

    /**
     * Settings Modal Functions
     */
    function openSettings() {
      document.getElementById('settings-modal').classList.add('active');
    }

    function closeSettings() {
      document.getElementById('settings-modal').classList.remove('active');
    }

    function saveSettings() {
      const newVersion = document.getElementById('setting-bible').value;
      const newLang = document.getElementById('setting-language').value;
      
      userConfig.bibleVersion = newVersion;
      userConfig.language = newLang;
      
      localStorage.setItem('sangocast_bible_version', newVersion);
      localStorage.setItem('sangocast_language', newLang);
      
      // Update Prayer Alarm Language immediately
      SangocastPrayerAlarms.setLanguage(newLang);
      
      closeSettings();
      updateContent(); // Reload with new settings
      
      console.log('✅ Settings Saved');
    }

    // Initialize on load
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  </script>
