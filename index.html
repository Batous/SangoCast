<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SangoCast - Broadcasting Sango Malamu Daily</title>
  <meta name="description" content="Daily Bible reading with prayer alarms and pastoral insights">
  <meta name="theme-color" content="#667eea">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      overflow: hidden;
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      transition: background 1s ease;
    }

    /* Seasonal Backgrounds */
    body.advent { background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%); }
    body.christmas { background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); }
    body.lent { background: linear-gradient(135deg, #92400e 0%, #78350f 100%); }
    body.easter { background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%); }
    body.pentecost { background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%); }
    body.ordinary { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }

    .app-container {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      color: white;
    }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 32px;
      background: rgba(0, 0, 0, 0.2);
      backdrop-filter: blur(10px);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .logo {
      font-size: 32px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .datetime {
      display: flex;
      flex-direction: column;
      align-items: center; /* Center text horizontally */
      font-size: 14px;
      opacity: 0.9;
    }

    .date {
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .time {
      font-size: 48px; /* Enlarged Clock */
      font-weight: 700;
      font-family: 'Courier New', monospace;
      line-height: 1;
      margin-top: 5px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.3);
    }

  .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
      flex: 1;
      justify-content: flex-end; /* Aligns buttons to the right */
    }

    .network-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
    }

    .network-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #10b981;
      box-shadow: 0 0 10px currentColor;
      animation: pulse 2s infinite;
    }

    .network-dot.offline {
      background: #ef4444;
    }

    .settings-btn {
      background: rgba(255, 255, 255, 0.15);
      border: none;
      color: white;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 20px;
      transition: all 0.2s;
    }

    .settings-btn:hover {
      background: rgba(255, 255, 255, 0.25);
      transform: rotate(90deg);
    }

    /* Main Content */
    .content {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 32px;
    }

    .verse-container {
      max-width: 900px;
      width: 100%;
      text-align: center;
      animation: fadeIn 1s ease;
    }

    .verse-text {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 48px;
      line-height: 1.6;
      margin-bottom: 32px;
      text-shadow: 0 2px 20px rgba(0, 0, 0, 0.3);
      font-style: italic;
      animation: fadeIn 1s ease;
    }

    .verse-reference {
      font-size: 24px;
      font-weight: 700;
      opacity: 0.9;
      margin-bottom: 12px;
    }

    .verse-meta {
      font-size: 16px;
      opacity: 0.7;
      margin-top: 8px;
    }

    .verse-commentary {
      max-width: 700px;
      margin: 24px auto 0;
      padding: 20px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      font-size: 18px;
      line-height: 1.6;
      font-style: italic;
    }

    /* Channel Info */
    .channel-info {
      position: fixed;
      bottom: 24px;
      left: 32px;
      background: rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(10px);
      padding: 16px 24px;
      border-radius: 12px;
      font-size: 14px;
      max-width: 300px;
    }

    .channel-name {
      font-weight: 700;
      margin-bottom: 4px;
    }

    .channel-id {
      font-size: 12px;
      opacity: 0.7;
      font-family: monospace;
    }

    /* Loading State */
    .loading {
      text-align: center;
      padding: 60px;
    }

    .loading-spinner {
      width: 60px;
      height: 60px;
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    /* Animations */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.5;
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* Settings Modal */
    .settings-modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(4px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    .settings-modal.active {
      display: flex;
    }

    .settings-content {
      background: white;
      color: #1f2937;
      border-radius: 20px;
      padding: 32px;
      max-width: 500px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
    }

    .settings-title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 24px;
      color: #1f2937;
    }

    .settings-group {
      margin-bottom: 24px;
    }

    .settings-label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
      color: #4b5563;
    }

    select, input {
      width: 100%;
      padding: 12px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      font-size: 15px;
      background: white;
    }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-secondary {
      background: #f3f4f6;
      color: #4b5563;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .header {
        padding: 16px 20px;
      }

      .logo {
        font-size: 24px;
      }

      .verse-text {
        font-size: 32px;
      }

      .verse-reference {
        font-size: 18px;
      }

      .content {
        padding: 40px 20px;
      }

      .channel-info {
        bottom: 16px;
        left: 20px;
        right: 20px;
        max-width: none;
      }
    }

    /* Default-mode warning banner */
    .defaults-banner {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: rgba(251, 191, 36, 0.92);   /* amber */
      backdrop-filter: blur(6px);
      color: #1f2937;
      font-size: 13px;
      font-weight: 600;
      text-align: center;
      padding: 7px 16px;
      z-index: 8888;
      letter-spacing: 0.3px;
      display: none;                           /* hidden until triggered */
    }

    .defaults-banner.active {
      display: block;
      animation: fadeIn 0.6s ease;
    }

    /* Push header down so banner doesn't overlap it */
    body.defaults-mode .header {
      margin-top: 34px;
    }
    .fullscreen .header {
      display: none;
    }

    .fullscreen .channel-info {
      display: none;
    }
  </style>
</head>

    // NEW: Centralized async init with awaiting registrations and preloads
    async function initModulesAndPrioritizer() {
      // Wait for DOM and modules to load
      await new Promise(resolve => {
        if (document.readyState === 'complete') resolve();
        else window.addEventListener('load', resolve);
      });

      // Confirm modules are defined
      if (typeof SangocastBibleLookup === 'undefined') {
        console.error('❌ BibleLookupModule not loaded. Check script src/order.');
        return;  // Fallback to error display
      }
      if (typeof SangocastContentPrioritizer === 'undefined') {

      }

        LSG: '/data/bibles/lsg.json',
        // Add all supported versions here (e.g., ASV, BBE, etc.)
      };
      
      Object.entries(bibleFiles).forEach(([code, path]) => {
        SangocastBibleLookup.registerBible(code, path);
      });

      // Preload default Bible to avoid race on first lookup
      // This is key: Await load of KJV (or user default) before prioritizer init
      try {
        await SangocastBibleLookup.loadBible(userConfig.bibleVersion || 'KJV');
        console.log('📖 Bible préchargée:', userConfig.bibleVersion);
      } catch (err) {
        console.warn('⚠️ Preload Bible failed:', err);
        // Continue with fallback possible
      }

      // Now init prioritizer (awaited in its own init)
      const installDate = localStorage.getItem('sangocast_install_date');
      await SangocastContentPrioritizer.init(installDate);

      console.log('📖 Bibles enregistrées:', Object.keys(bibleFiles).length,
        '— disponibles:', SangocastBibleLookup.getAvailableBibles());
      console.log('✅ All modules initialized and ready');
    }

    // Trigger init on load
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
