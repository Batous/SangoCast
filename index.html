<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SangoCast - Broadcasting Sango Malamu Daily</title>
  <meta name="description" content="Daily Bible reading with prayer alarms and pastoral insights">
  <meta name="theme-color" content="#667eea">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      overflow: hidden;
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      transition: background 1s ease;
    }

    /* Seasonal Backgrounds */
    body.advent { background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%); }
    body.christmas { background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); }
    body.lent { background: linear-gradient(135deg, #92400e 0%, #78350f 100%); }
    body.easter { background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%); }
    body.pentecost { background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%); }
    body.ordinary { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }

    .app-container {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      color: white;
    }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 32px;
      background: rgba(0, 0, 0, 0.2);
      backdrop-filter: blur(10px);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .logo {
      font-size: 32px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .datetime {
      display: flex;
      flex-direction: column;
      align-items: center; /* Center text horizontally */
      font-size: 14px;
      opacity: 0.9;
    }

    .date {
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .time {
      font-size: 48px; /* Enlarged Clock */
      font-weight: 700;
      font-family: 'Courier New', monospace;
      line-height: 1;
      margin-top: 5px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.3);
    }

  .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
      flex: 1;
      justify-content: flex-end; /* Aligns buttons to the right */
    }

    .network-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
    }

    .network-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #10b981;
      box-shadow: 0 0 10px currentColor;
      animation: pulse 2s infinite;
    }

    .network-dot.offline {
      background: #ef4444;
    }

    .settings-btn {
      background: rgba(255, 255, 255, 0.15);
      border: none;
      color: white;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 20px;
      transition: all 0.2s;
    }

    .settings-btn:hover {
      background: rgba(255, 255, 255, 0.25);
      transform: rotate(90deg);
    }

    /* Main Content */
    .content {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 32px;
    }

    .verse-container {
      max-width: 900px;
      width: 100%;
      text-align: center;
      animation: fadeIn 1s ease;
    }

    .verse-text {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 48px;
      line-height: 1.6;
      margin-bottom: 32px;
      text-shadow: 0 2px 20px rgba(0, 0, 0, 0.3);
      font-style: italic;
      animation: fadeIn 1s ease;
    }

    .verse-reference {
      font-size: 24px;
      font-weight: 700;
      opacity: 0.9;
      margin-bottom: 12px;
    }

    .verse-meta {
      font-size: 16px;
      opacity: 0.7;
      margin-top: 8px;
    }

    .verse-commentary {
      max-width: 700px;
      margin: 24px auto 0;
      padding: 20px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      font-size: 18px;
      line-height: 1.6;
      font-style: italic;
    }

    /* Channel Info */
    .channel-info {
      position: fixed;
      bottom: 24px;
      left: 32px;
      background: rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(10px);
      padding: 16px 24px;
      border-radius: 12px;
      font-size: 14px;
      max-width: 300px;
    }

    .channel-name {
      font-weight: 700;
      margin-bottom: 4px;
    }

    .channel-id {
      font-size: 12px;
      opacity: 0.7;
      font-family: monospace;
    }

    /* Loading State */
    .loading {
      text-align: center;
      padding: 60px;
    }

    .loading-spinner {
      width: 60px;
      height: 60px;
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    /* Animations */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.5;
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* Settings Modal */
    .settings-modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(4px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    .settings-modal.active {
      display: flex;
    }

    .settings-content {
      background: white;
      color: #1f2937;
      border-radius: 20px;
      padding: 32px;
      max-width: 500px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
    }

    .settings-title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 24px;
      color: #1f2937;
    }

    .settings-group {
      margin-bottom: 24px;
    }

    .settings-label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
      color: #4b5563;
    }

    select, input {
      width: 100%;
      padding: 12px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      font-size: 15px;
      background: white;
    }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-secondary {
      background: #f3f4f6;
      color: #4b5563;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .header {
        padding: 16px 20px;
      }

      .logo {
        font-size: 24px;
      }

      .verse-text {
        font-size: 32px;
      }

      .verse-reference {
        font-size: 18px;
      }

      .content {
        padding: 40px 20px;
      }

      .channel-info {
        bottom: 16px;
        left: 20px;
        right: 20px;
        max-width: none;
      }
    }

    /* Fullscreen mode */
    .fullscreen .header {
      display: none;
    }

    .fullscreen .channel-info {
      display: none;
    }
  </style>
</head>

    /**
     * Return translated string for key in the active language.
     * Falls back to fr-FR, then to the key itself.
     */
    function t(key) {
      const lang = userConfig.language || 'fr-FR';
      return (UI_STRINGS[lang] && UI_STRINGS[lang][key])
          || (UI_STRINGS['fr-FR'] && UI_STRINGS['fr-FR'][key])
          || key;
    }

    /**
     * Walk every translatable element by ID and update its textContent.
     * Safe to call at any time — silently skips missing elements.
     */
    function applyTranslations() {
      const keys = [
        'lbl-settings-title', 'lbl-channel', 'lbl-loading-channels',
        'lbl-bible', 'lbl-age', 'lbl-age-adults', 'lbl-age-family',
        'lbl-age-children', 'lbl-language',
        'btn-save', 'btn-close', 'btn-reconfig', 'lbl-loading-verse'
      ];
      keys.forEach(key => {
        const el = document.getElementById(key);
        if (el) el.textContent = t(key);
      });
      console.log('🌐 Traductions appliquées:', userConfig.language);
    }

    /**
     * Initialize app
     */
    async function init() {
      console.log('🚀 Initialisation SangoCast...');

      // Check if configured
      const configured = localStorage.getItem('sangocast_configured');
      
      if (!configured || configured !== 'true') {
        console.log('⚠️ Première utilisation - afficher wizard');
        // Setup wizard will show automatically via setup-wizard.js
        return;
      }

      // Load user configuration
      loadUserConfig();

      // Apply UI translations for the active language
      applyTranslations();

      // Initialize all modules
      await initializeModules();

      // Start timers
      startTimers();

      // Load initial content
      await updateContent();

      // Show channel info
      displayChannelInfo();

      console.log('✅ SangoCast initialisé');
    }

    /**
     * Load user configuration from localStorage
     */
    function loadUserConfig() {
      userConfig.channelId = localStorage.getItem('sangocast_channel_id') || 'SCR-EN-GL-0001';
      userConfig.bibleVersion = JSON.parse(localStorage.getItem('sangocast_bible_versions') || '["KJV"]')[0];
      userConfig.ageMode = localStorage.getItem('sangocast_age_mode') || 'family_mode';
      userConfig.language = localStorage.getItem('sangocast_language') || 'fr-FR';
      userConfig.tradition = localStorage.getItem('sangocast_tradition') || 'protestant';

      console.log('📋 Configuration chargée:', userConfig);
    }

    /**
     * Initialize all modules
     */
    async function initializeModules() {
      try {
        // Age Filter
        await SangocastAgeFilter.init();
        SangocastAgeFilter.setAgeMode(userConfig.ageMode);

        // Prayer Alarms
        const prayerTimes = JSON.parse(localStorage.getItem('sangocast_prayer_times') || '[6,12,18,21]');
        SangocastPrayerAlarms.setPrayerTimes(prayerTimes);
        SangocastPrayerAlarms.setLanguage(userConfig.language);

        // Content Prioritizer
        const installDate = localStorage.getItem('sangocast_install_date');
        await SangocastContentPrioritizer.init(installDate);

        // Horner Engine
        await SangocastHornerEngine.loadPlan();

        // Network Manager
        SangocastNetworkManager.addChangeListener(updateNetworkIndicator);
        await SangocastNetworkManager.performHeartbeat();

        console.log('✅ Modules initialisés');
      } catch (error) {
        console.error('❌ Erreur initialisation modules:', error);
      }
    }

    /**
     * Start all timers
     */
    function startTimers() {
      // Update clock every second
      setInterval(updateClock, 1000);
      updateClock();

      // Update content every 10 minutes
      setInterval(updateContent, 10 * 60 * 1000);

      // Update network every 5 seconds
      setInterval(() => {
        updateNetworkIndicator(SangocastNetworkManager.getStatus());
      }, 5000);

      // Update liturgical background every hour
      setInterval(updateLiturgicalBackground, 60 * 60 * 1000);
      updateLiturgicalBackground();

      console.log('⏰ Timers démarrés');
    }

    /**
     * Update clock display
     */
    function updateClock() {
      const now = new Date();
      
      // Date
      const dateOptions = { 
        weekday: 'long', 
        year: 'numeric', 
        month: 'long', 
        day: 'numeric' 
      };
      const dateStr = now.toLocaleDateString(userConfig.language, dateOptions);
      document.getElementById('current-date').textContent = dateStr;

      // Time
      const timeStr = now.toLocaleTimeString(userConfig.language, {
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit'
      });
      document.getElementById('current-time').textContent = timeStr;
    }

    /**
     * Update network indicator
     */
    function updateNetworkIndicator(status) {
      const dot = document.getElementById('network-dot');
      const text = document.getElementById('network-status');

      if (status.isOnline) {
        dot.classList.remove('offline');
        text.textContent = t('network-online');
      } else {
        dot.classList.add('offline');
        text.textContent = t('network-offline');
      }
    }

    /**
     * Update main content
     */
    async function updateContent() {
      try {
        console.log('🔄 Mise à jour contenu...');

        // If the prioritizer module isn't loaded yet, drop straight to fallback
        if (typeof SangocastContentPrioritizer === 'undefined') {
          throw new Error('ContentPrioritizer not yet available');
        }

        // Get content from prioritizer
        const content = await SangocastContentPrioritizer.getContentForNow(
          userConfig.channelId,
          userConfig.ageMode,
          userConfig.tradition,
          userConfig.bibleVersion
        );

        currentContent = content;

        // Display content
        displayContent(content);

        console.log('✅ Contenu mis à jour:', content);

      } catch (error) {
        console.error('❌ Erreur mise à jour contenu:', error);
        console.log('📖 SangoCast › Basculement vers le plan de lecture par défaut...');
        displayFallbackVerse();
      }
    }

    /**
     * Display content
     */
    function displayContent(content) {
      const container = document.getElementById('verse-container');

      if (content.type === 'video') {
        container.innerHTML = `
          <div class="verse-text">🎥 Diffusion Live</div>
          <div class="verse-reference">${content.content.title}</div>
          <div class="verse-meta">En direct maintenant</div>
          <div style="margin-top: 32px;">
            <a href="${content.content.url}" target="_blank" 
               style="display: inline-block; padding: 16px 32px; background: rgba(255,255,255,0.2); 
                      border-radius: 12px; color: white; text-decoration: none; font-weight: 700;">
              ▶️ Regarder
            </a>
          </div>
        `;
      } else if (content.type === 'audio') {
        container.innerHTML = `
          <div class="verse-text">🔊 Diffusion Audio</div>
          <div class="verse-reference">${content.content.title}</div>
          <div class="verse-meta">En direct maintenant</div>
          <div style="margin-top: 32px;">
            <a href="${content.content.url}" target="_blank" 
               style="display: inline-block; padding: 16px 32px; background: rgba(255,255,255,0.2); 
                      border-radius: 12px; color: white; text-decoration: none; font-weight: 700;">
              ▶️ Écouter
            </a>
          </div>
        `;
      } else {
        // Text content
        let html = `
          <div class="verse-text">"${content.content.text}"</div>
          <div class="verse-reference">— ${content.content.reference}</div>
          <div class="verse-meta">${content.content.version}</div>
        `;

        // Add commentary if present
        if (content.content.commentary) {
          html += `<div class="verse-commentary">💭 ${content.content.commentary}</div>`;
        }

        // Add metadata
        if (content.content.pastor) {
          html += `<div class="verse-meta" style="margin-top: 16px;">👤 ${content.content.pastor}</div>`;
        }

        if (content.content.liturgicalName) {
          html += `<div class="verse-meta" style="margin-top: 8px;">⛪ ${content.content.liturgicalName}</div>`;
        }

        container.innerHTML = html;
      }

      // Trigger animation
      container.style.animation = 'none';
      setTimeout(() => {
        container.style.animation = 'fadeIn 1s ease';
      }, 10);
    }

    /**
     * Build a human-readable verse reference string.
     * e.g. "John 3:16" or "Psalm 23:1-3"
     */
    function buildReference(entry) {
      const vv = entry.verses;
      if (vv.length === 1) return `${entry.book} ${entry.chapter}:${vv[0]}`;
      // Show as range when consecutive, otherwise comma-list
      const isRange = vv.every((v, i) => i === 0 || v === vv[i - 1] + 1);
      return isRange
        ? `${entry.book} ${entry.chapter}:${vv[0]}–${vv[vv.length - 1]}`
        : `${entry.book} ${entry.chapter}:${vv.join(',')}`;
    }

    /**
     * Display one verse from the TESTING_PLAN.
     *
     * Priority order for the verse TEXT:
     *   1. BibleLookupModule (serves cached text offline too if pre-loaded)
     *   2. Commentary string as graceful offline fallback
     *
     * The function advances fallbackIndex so each call shows the next verse.
     * It is intentionally async so it can await BibleLookup without blocking.
     */
    async function displayFallbackVerse() {
      const entry = TESTING_PLAN[fallbackIndex % TESTING_PLAN.length];
      fallbackIndex++;

      const reference = buildReference(entry);
      let verseText   = entry.commentary;   // safe offline baseline

      // -- Attempt BibleLookup if the module is available ------------------
      // NOTE: le module s'appelle SangocastBibleLookup (pas BibleLookupModule)
      //       et expose .lookupVerse() (pas .lookup())
      if (typeof SangocastBibleLookup !== 'undefined') {
        try {
          const result = await SangocastBibleLookup.lookupVerse({
            book:    entry.book,
            chapter: entry.chapter,
            verses:  entry.verses,
            version: userConfig.bibleVersion || 'KJV'
          });
          if (result && result.text) {
            verseText = result.text;
          } else if (result && result.error) {
            console.warn('📖 BibleLookup erreur:', result.error, '— affichage commentaire pour:', reference);
          }
        } catch (e) {
          // BibleLookup failed (no network, no cache) — commentary text stays
          console.warn('📖 BibleLookup indisponible, affichage de la référence locale:', reference);
        }
      }
      // --------------------------------------------------------------------

      displayContent({
        type: 'text',
        content: {
          text:        verseText,
          reference:   reference,
          version:     userConfig.bibleVersion || 'KJV',
          commentary:  entry.commentary
        }
      });

      console.log(`📖 Fallback plan › ${reference} [${fallbackIndex}/${TESTING_PLAN.length}]`);
    }

    /**
     * Display error
     */
    function displayError() {
      const container = document.getElementById('verse-container');
      container.innerHTML = `
        <div class="verse-text">⚠️ Erreur</div>
        <div class="verse-reference">Impossible de charger le contenu</div>
        <div class="verse-meta">Vérifiez votre connexion et réessayez</div>
      `;
    }

    /**
     * Update liturgical background
     */
    function updateLiturgicalBackground() {
      // Get current date
      const now = new Date();
      const month = now.getMonth() + 1;
      const day = now.getDate();

      // Determine season (simplified - should use liturgical-calendar.json)
      let season = 'ordinary';

      // Advent (4 weeks before Christmas)
      if (month === 12 && day >= 1 && day <= 24) {
        season = 'advent';
      }
      // Christmas (Dec 25 - Jan 6)
      else if ((month === 12 && day >= 25) || (month === 1 && day <= 6)) {
        season = 'christmas';
      }
      // Lent (40 days before Easter - approximate)
      else if (month === 2 || month === 3) {
        season = 'lent';
      }
      // Easter (50 days - approximate)
      else if (month === 4 || (month === 5 && day <= 15)) {
        season = 'easter';
      }
      // Pentecost
      else if (month === 5 || month === 6) {
        season = 'pentecost';
      }

      // Update body class
      document.body.className = season;

      console.log('🎨 Saison liturgique:', season);
    }

    /**
     * Display channel info
     */
    function displayChannelInfo() {
      // Load channel metadata (from channels.json or cache)
      const channelName = localStorage.getItem('sangocast_channel_name') || 'SangoCast Channel';
      
      document.getElementById('channel-name').textContent = channelName;
      document.getElementById('channel-id').textContent = userConfig.channelId;
      document.getElementById('channel-info').style.display = 'block';
    }

    /**
     * Open settings modal
     */
    async function openSettings() {
      // Load available channels
      try {
        const response = await fetch('/data/channels.json');
        if (response.ok) {
          const data = await response.json();
          availableChannels = data.channels || [];
          
          // Populate channel dropdown
          const channelSelect = document.getElementById('setting-channel');
          channelSelect.innerHTML = availableChannels.map(ch => `
            <option value="${ch.id}" ${ch.id === userConfig.channelId ? 'selected' : ''}>
              ${ch.metadata.name}
            </option>
          `).join('');
        }
      } catch (error) {
        console.warn('Could not load channels:', error);
      }

      // Populate other settings
      document.getElementById('setting-bible').value = userConfig.bibleVersion;
      document.getElementById('setting-age').value = userConfig.ageMode;
      document.getElementById('setting-language').value = userConfig.language;

      // Show modal
      document.getElementById('settings-modal').classList.add('active');
    }

    /**
     * Close settings modal
     */
    function closeSettings() {
      document.getElementById('settings-modal').classList.remove('active');
    }

    /**
     * Save settings
     */
    function saveSettings() {
      // Get new values
      const newChannelId = document.getElementById('setting-channel').value;
      const newBibleVersion = document.getElementById('setting-bible').value;
      const newAgeMode = document.getElementById('setting-age').value;
      const newLanguage = document.getElementById('setting-language').value;

      // Save to localStorage
      localStorage.setItem('sangocast_channel_id', newChannelId);
      localStorage.setItem('sangocast_bible_versions', JSON.stringify([newBibleVersion]));
      localStorage.setItem('sangocast_age_mode', newAgeMode);
      localStorage.setItem('sangocast_language', newLanguage);

      // Update config
      userConfig.channelId = newChannelId;
      userConfig.bibleVersion = newBibleVersion;
      userConfig.ageMode = newAgeMode;
      userConfig.language = newLanguage;

      // Apply changes
      SangocastAgeFilter.setAgeMode(newAgeMode);
      SangocastPrayerAlarms.setLanguage(newLanguage);

      // Refresh UI labels for newly selected language
      applyTranslations();

      // Reload content
      updateContent();
      displayChannelInfo();

      // Close modal
      closeSettings();

      console.log('✅ Paramètres sauvegardés');
    }

    /**
     * Reconfigure (reset and show wizard)
     */
    function reconfigure() {
      if (confirm(t('confirm-reconfig'))) {
        // Clear all config
        localStorage.removeItem('sangocast_configured');
        localStorage.removeItem('sangocast_age_mode');
        localStorage.removeItem('sangocast_language');
        localStorage.removeItem('sangocast_tradition');
        localStorage.removeItem('sangocast_channel_id');
        localStorage.removeItem('sangocast_bible_versions');
        localStorage.removeItem('sangocast_prayer_times');
        localStorage.removeItem('sangocast_audio_hours');
        localStorage.removeItem('sangocast_install_date');

        // Reload page (wizard will show)
        window.location.reload();
      }
    }

    // Initialize on page load
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
